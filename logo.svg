<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#141428"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)" stroke="#1e293b" stroke-width="4"/>

  <!-- Mesh/knot — 3 interlocking rings representing multi-agent collaboration -->
  <g opacity="0.85">
    <!-- Ring 1 (Planner) — top-right -->
    <path d="M256 120 C310 120 360 160 370 220 C378 270 350 320 310 340"
          stroke="url(#accent)" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Ring 2 (Editor) — bottom -->
    <path d="M160 300 C140 260 140 210 170 175 C200 140 250 130 290 150"
          stroke="url(#warm)" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Ring 3 (Reviewer) — top-left -->
    <path d="M190 370 C150 380 110 350 100 310 C88 265 110 220 150 200"
          stroke="#38bdf8" stroke-width="8" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Terminal prompt: ply> with cursor block -->
  <g transform="translate(170, 310)">
    <!-- "ply" text -->
    <text x="0" y="0" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace"
          font-size="72" font-weight="700" fill="#e2e8f0" letter-spacing="2">
      ply<tspan fill="url(#accent)">&gt;</tspan>
    </text>
    <!-- Blinking cursor block -->
    <rect x="195" y="-52" width="8" height="60" rx="2" fill="#22d3ee" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.1;0.9" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Three dots indicating AI processing -->
  <circle cx="256" cy="430" r="5" fill="#22d3ee" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle cx="280" cy="430" r="5" fill="#22d3ee" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="304" cy="430" r="5" fill="#22d3ee" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
</svg>
